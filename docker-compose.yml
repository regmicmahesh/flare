services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - flare-data:/data
    environment:
      FLARE_DATA_DIR: /data
      PORT: "8080"
      RUST_LOG: flare=info,tower_http=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  flare-data:
